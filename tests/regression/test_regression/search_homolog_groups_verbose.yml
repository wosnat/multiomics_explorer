  cyanorak_roles: []
  description: Modifies, by uridylylation and deuridylylation, the PII regulatory
    proteins (GlnB and homologs), in response to the nitrogen status of the cell that
    GlnD senses through the glutamine level. Under low glutamine levels, catalyzes
    the conversion of the PII proteins and UTP to PII-UMP and PPi, while under higher
    glutamine levels, GlnD hydrolyzes PII-UMP to PII and UMP (deuridylylation). Thus,
    controls uridylylation state and activity of the PII proteins, and plays an important
    role in the regulation of nitrogen
