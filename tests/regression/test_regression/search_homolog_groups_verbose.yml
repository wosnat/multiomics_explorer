  consensus_gene_name: glnE
  consensus_product: bifunctional [glutamate--ammonia ligase]-adenylyl-L-tyrosine
    phosphorylase/[glutamate--ammonia-ligase] adenylyltransferase
  cyanorak_roles: []
  description: Involved in the regulation of glutamine synthetase GlnA, a key enzyme
    in the process to assimilate ammonia. When cellular nitrogen levels are high,
    the C-terminal adenylyl transferase (AT) inactivates GlnA by covalent transfer
    of an adenylyl group from ATP to specific tyrosine residue of GlnA, thus reducing
    its activity. Conversely, when nitrogen levels are low, the N-terminal adenylyl
    removase (AR) activates GlnA by removing the adenylyl group by phosphorolysis,
    increasing its activity. The regulatory region of GlnE binds the signal transduction
    protein PII (GlnB) which indicates the nitrogen status of the cell
  functional_description: Coenzyme transport and metabolism
  genera:
  - Alteromonas
