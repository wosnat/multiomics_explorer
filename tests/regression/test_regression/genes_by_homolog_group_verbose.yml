- consensus_product: photosystem II chlorophyll-binding protein CP47
  function_description: One of the components of the core complex of photosystem II
    (PSII). It binds chlorophyll and helps catalyze the primary light-induced photochemical
    processes of PSII. PSII is a light-driven water:plastoquinone oxidoreductase,
    using light energy to abstract electrons from H(2)O, generating O(2) and a proton
    gradient subsequently used for ATP formation
  gene_category: Photosynthesis
  gene_name: psbB
