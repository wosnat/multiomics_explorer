  function_description: Necessary for efficient RNA polymerase transcription elongation
    past template-encoded arresting sites. The arresting sites in DNA have the property
    of trapping a certain fraction of elongating RNA polymerases that pass through,
    resulting in locked ternary complexes. Cleavage of the nascent transcript by cleavage
    factors such as GreA or GreB allows the resumption of elongation from the new
    3^terminus. GreA releases sequences of 2 to 3 nucleotides
  gene_name: greA
  gene_summary: 'greA :: transcription elongation factor GreA :: Necessary for efficient
    RNA polymerase transcription elongation past template-encoded arresting sites.
    The arresting sites in DNA have the property of trapping a certain fraction of
    elongating RNA polymerases that pass through, resulting in locked ternary complexes.
    Cleavage of the nascent transcript by cleavage factors such as GreA or GreB allows
    the resumption of elongation from the new 3^terminus. GreA releases sequences
    of 2 to 3 nucleotides'
