- annotation_quality: 3
  function_description: Plays an essential role in the initiation and regulation of
    chromosomal replication. ATP-DnaA binds to the origin of replication (oriC) to
    initiate formation of the DNA replication initiation complex once per cell cycle.
    Binds the DnaA box (a 9 base pair repeat at the origin) and separates the double-stranded
    (ds)DNA. Forms a right-handed helical filament on oriC DNA; dsDNA binds to the
    exterior of the filament while single-stranded (ss)DNA is stabiized in the filament^s
    interior. The ATP-DnaA-oriC complex binds and stabilizes one strand of the AT-rich
    DNA unwinding element (DUE), permitting loading of DNA polymerase. After initiation
    quickly degrades to an ADP-DnaA complex that is not apt for DNA replication. Binds
    acidic phospholipids
  gene_name: dnaA
  gene_summary: 'dnaA :: chromosomal replication initiator protein :: Plays an essential
    role in the initiation and regulation of chromosomal replication. ATP-DnaA binds
    to the origin of replication (oriC) to initiate formation of the DNA replication
    initiation complex once per cell cycle. Binds the DnaA box (a 9 base pair repeat
    at the origin) and separates the double-stranded (ds)DNA. Forms a right-handed
    helical filament on oriC DNA; dsDNA binds to the exterior of the filament while
    single-stranded (ss)DNA is stabiized in the filament^s interior. The ATP-DnaA-oriC
    complex binds and stabilizes one strand of the AT-rich DNA unwinding element (DUE),
    permitting loading of DNA polymerase. After initiation quickly degrades to an
    ADP-DnaA complex that is not apt for DNA replication. Binds acidic phospholipids'
