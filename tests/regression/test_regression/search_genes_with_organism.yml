  function_description: 'DNA-dependent ATPase involved in processing of recombination
    intermediates, plays a role in repairing DNA breaks. Stimulates the branch migration
    of RecA-mediated strand transfer reactions, allowing the 3^ invading strand to
    extend heteroduplex DNA faster. Binds ssDNA in the presence of ADP but not other
    nucleotides, has ATPase activity that is stimulated by ssDNA and various branched
    DNA structures, but inhibited by SSB. Does not have RecA^s homology-searching
    function. ; FUNCTION: Plays a role in repairing double-strand DNA breaks, probably
    involving stabilizing or processing branched DNA or blocked replication forks'
  gene_name: radA
