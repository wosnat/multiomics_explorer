- annotation_quality: 3
  function_description: Confers DNA tethering and processivity to DNA polymerases
    and other proteins. Acts as a clamp, forming a ring around DNA (a reaction catalyzed
    by the clamp-loading complex) which diffuses in an ATP-independent manner freely
    and bidirectionally along dsDNA. Initially characterized for its ability to contact
    the catalytic subunit of DNA polymerase III (Pol III), a complex, multichain enzyme
    responsible for most of the replicative synthesis in bacteria; Pol III exhibits
    3^-5^ exonuclease proofreading activity. The beta chain is required for initiation
    of replication as well as for processivity of DNA replication
  gene_name: dnaN
  gene_summary: 'dnaN :: DNA polymerase III, beta subunit :: Confers DNA tethering
    and processivity to DNA polymerases and other proteins. Acts as a clamp, forming
    a ring around DNA (a reaction catalyzed by the clamp-loading complex) which diffuses
    in an ATP-independent manner freely and bidirectionally along dsDNA. Initially
    characterized for its ability to contact the catalytic subunit of DNA polymerase
    III (Pol III), a complex, multichain enzyme responsible for most of the replicative
    synthesis in bacteria; Pol III exhibits 3^-5^ exonuclease proofreading activity.
    The beta chain is required for initiation of replication as well as for processivity
    of DNA replication'
  locus_tag: PMM0001
  organism_strain: Prochlorococcus MED4
  product: DNA polymerase III, beta subunit
