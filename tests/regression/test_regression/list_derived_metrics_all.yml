  field_description: 'Per-gene expression-level class assigned from RPKM quartiles
    aggregated across 10 RNA-seq samples (MED4 in Pro99 and AMP media, exponential
    and log-phase; 21C, continuous light at 28 umol quanta m-2 s-1). Class meanings
    reported in Wang 2014: VEG = very highly expressed (top RPKM quartile across conditions);
    HEG = highly expressed, enriched for COG "C" energy production and conversion,
    "J" translation and ribosomal structure, and "O" protein modification, folding
    and turnover (Figure 4c) and showing significantly lower nonsynonymous substitution
    rate (Ka) than MEG or LEG (P<0.001, Figure 3a); MEG = moderately expressed, significantly
    enriched for essential genes with homologs in the Database of Essential Genes
    (DEG-hit rate, P<0.001, Figure 4b); LEG = lowly expressed, slightly enriched for
    COG "R" general function (P=0.023); NEG = not expressed, under-represented in
    the core genome (1.5% core vs 6.6% flexible, P<0.001, Figure 3c); -- = unclassified
    (RPKM did not fit any quartile bin).'
