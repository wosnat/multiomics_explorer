    across sequenced Prochlorococcus genomes (Prochlorococcus core gene set); Flexible
    = strain-specific or variably present across Prochlorococcus genomes (flexible/accessory
    gene set). Wang 2014 reports that the core genome contains significantly fewer
    NEG and VEG genes than the flexible genome (NEG: 1.5% < 6.6%; VEG: 49.6% < 64.6%;
    both P<0.001, Figure 3c), indicating that conserved core genes cluster around
    moderate expression while flexible genes are enriched at the high and low extremes.'
