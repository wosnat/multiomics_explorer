- annotation_quality: 3
  function_description: Essential cell division protein that forms a contractile ring
    structure (Z ring) at the future cell division site. The regulation of the ring
    assembly controls the timing and the location of cell division. One of the functions
    of the FtsZ ring is to recruit other cell division proteins to the septum to produce
    a new cell wall between the dividing cells. Binds GTP and shows GTPase activity
  gene_name: ftsZ
  locus_tag: SYNW1644
  organism_strain: Synechococcus WH8102
  product: cell division protein FtsZ
  score: 10.2671
- annotation_quality: 3
  function_description: Prevents the cell division inhibition by proteins MinC and
    MinD at internal division sites while permitting inhibition at polar sites. This
    ensures cell division at the proper site by restricting the formation of a division
    septum at the midpoint of the long axis of the cell
  gene_name: minE
  locus_tag: SYNW1972
