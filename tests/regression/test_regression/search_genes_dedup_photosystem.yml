  function_description: Photosystem II (PSII) is a light-driven water plastoquinone
    oxidoreductase that uses light energy to abstract electrons from H(2)O, generating
    O(2) and a proton gradient subsequently used for ATP formation. It consists of
    a core antenna complex that captures photons, and an electron transfer chain that
    converts photonic excitation into a charge separation. The D1 D2 (PsbA PsbA) reaction
    center heterodimer binds P680, the primary electron donor of PSII as well as several
    subsequent electron acceptors
