- annotation_quality: 3
  function_description: Negative regulator of replication initiation, which contributes
    to regulation of DNA replication and ensures that replication initiation occurs
    exactly once per chromosome per cell cycle. Binds to pairs of hemimethylated GATC
    sequences in the oriC region, thus preventing assembly of replication proteins
    and re- initiation at newly replicated origins. Repression is relieved when the
    region becomes fully methylated
  gene_name: seqA
