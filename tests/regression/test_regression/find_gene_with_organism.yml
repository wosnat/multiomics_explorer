- annotation_quality: 2
  gene_name: radA
  gene_summary: 'radA :: DNA repair protein Sms/RadA :: DNA-dependent ATPase involved
    in processing of recombination intermediates, plays a role in repairing DNA breaks.
    Stimulates the branch migration of RecA-mediated strand transfer reactions, allowing
    the 3^ invading strand to extend heteroduplex DNA faster. Binds ssDNA in the presence
    of ADP but not other nucleotides, has ATPase activity that is stimulated by ssDNA
    and various branched DNA structures, but inhibited by SSB. Does not have RecA^s
    homology-searching function. ; FUNCTION: Plays a role in repairing double-strand
    DNA breaks, probably involving stabilizing or processing branched DNA or blocked
    replication forks'
  locus_tag: PMM0133
  organism_strain: Prochlorococcus MED4
  product: DNA repair protein Sms/RadA
  score: 18.8748
- annotation_quality: 2
  gene_name: mutS2
  gene_summary: 'mutS2 :: DNA mismatch repair protein, MutS family :: Acts as a ribosome
    collision sensor, splitting the ribosome into its 2 subunits. Detects stalled/collided
    70S ribosomes which it binds and splits by an ATP-hydrolysis driven conformational
    change. Acts upstream of the ribosome quality control system (RQC), a ribosome-associated
    complex that mediates the extraction of incompletely synthesized nascent chains
    from stalled ribosomes and their subsequent degradation. Probably generates substrates
    for RQC. ; FUNCTION: Endonuclease that is involved in the suppression of homologous
    recombination and thus may have a key role in the control of bacterial genetic
    diversity'
  locus_tag: PMM0217
  organism_strain: Prochlorococcus MED4
  product: DNA mismatch repair protein, MutS family
  score: 19.1619
