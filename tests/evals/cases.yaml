# ── Homologs with expression ────────────────────────────

- id: homologs_with_expression
  tool: get_homologs_with_expression
  desc: Homologs of PMM0845 enriched with expression data
  params:
    gene_id: PMM0845
  expect:
    min_rows: 1

# ── Filter values ────────────────────────────────────────

- id: list_filter_values
  tool: list_filter_values
  desc: Returns gene categories and condition types
  params: {}
  expect:
    # This tool returns a combined JSON, so eval assertions are on the
    # tool wrapper response. Use a raw_cypher case for each sub-query
    # to snapshot the individual lists.

- id: list_filter_values_categories
  tool: raw_cypher
  desc: Snapshot of all gene categories with counts
  params:
    query: >
      MATCH (g:Gene) WHERE g.gene_category IS NOT NULL
      RETURN g.gene_category AS category, count(*) AS gene_count
      ORDER BY gene_count DESC
  expect:
    min_rows: 20
    columns: [category, gene_count]
    contains:
      category: Photosynthesis

- id: list_filter_values_conditions
  tool: raw_cypher
  desc: Snapshot of all condition types with counts
  params:
    query: >
      MATCH (e:EnvironmentalCondition)
      RETURN e.condition_type AS condition_type, count(*) AS cnt
      ORDER BY cnt DESC
  expect:
    min_rows: 5
    columns: [condition_type, cnt]
    contains:
      condition_type: nitrogen_stress

# ── Validation queries ───────────────────────────────────

- id: gene_count_nonzero
  tool: raw_cypher
  desc: KG has genes loaded
  params:
    query: "MATCH (g:Gene) RETURN count(g) AS cnt"
  expect:
    min_rows: 1
    row0_check: "cnt > 0"

- id: no_orphan_genes
  tool: raw_cypher
  desc: All genes belong to an organism
  params:
    query: "MATCH (g:Gene) WHERE NOT (g)-[:Gene_belongs_to_organism]->() RETURN count(g) AS cnt"
  expect:
    row0:
      cnt: 0

- id: organisms_exist
  tool: raw_cypher
  desc: OrganismTaxon nodes are present
  params:
    query: "MATCH (o:OrganismTaxon) RETURN count(o) AS cnt"
  expect:
    min_rows: 1
    row0_check: "cnt > 0"

