# ── Genes by ontology ──────────────────────────────────────
# All four cases exercise the new long-format (gene × term) signature.
# Single organism is required. Modes: term_ids only / level only / both.

- id: genes_by_ontology_mode1_term_ids
  tool: genes_by_ontology
  desc: Mode 1 — term_ids only, hierarchy expanded DOWN
  params:
    ontology: go_bp
    organism: Prochlorococcus MED4
    term_ids: ["go:0006260"]
  expect:
    min_rows: 1
    columns: [locus_tag, gene_name, product, gene_category, term_id, term_name, level]

- id: genes_by_ontology_mode2_level
  tool: genes_by_ontology
  desc: Mode 2 — level only, rolls UP to level-N ancestors
  params:
    ontology: cyanorak_role
    organism: Prochlorococcus MED4
    level: 1
  expect:
    min_rows: 1
    columns: [locus_tag, gene_name, product, gene_category, term_id, term_name, level]

- id: genes_by_ontology_mode3_level_and_ids
  tool: genes_by_ontology
  desc: Mode 3 — level + term_ids, scoped rollup to provided level-N terms
  params:
    ontology: cyanorak_role
    organism: Prochlorococcus MED4
    level: 1
    term_ids: ["cyanorak.role:A.1"]
  expect:
    min_rows: 1
    columns: [locus_tag, gene_name, product, gene_category, term_id, term_name, level]

- id: genes_by_ontology_pfam_clans
  tool: genes_by_ontology
  desc: Pfam two-level — level=0 rolls Pfam domains UP to PfamClans
  params:
    ontology: pfam
    organism: Prochlorococcus MED4
    level: 0
  expect:
    min_rows: 1
    columns: [locus_tag, gene_name, product, gene_category, term_id, term_name, level]

