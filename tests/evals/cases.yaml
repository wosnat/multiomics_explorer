# Eval cases for KG query tools.
#
# Each case tests a specific tool/query pattern against the live KG.
# Fields:
#   id:       unique case identifier
#   tool:     which tool/query pattern is being tested
#   desc:     what the case verifies (biological meaning)
#   params:   kwargs passed to the query function
#   expect:   assertions on results
#     min_rows:    minimum number of result rows (default 1)
#     max_rows:    optional upper bound
#     columns:     required column names in results
#     contains:    dict of column -> value that must appear in at least one row
#     row0:        dict of column -> value for the first result row

# ── Gene lookup ──────────────────────────────────────────

- id: resolve_gene_by_locus_tag
  tool: resolve_gene
  desc: Exact lookup by locus_tag returns the correct gene
  params:
    identifier: PMM0001
  expect:
    min_rows: 1
    columns: [locus_tag, gene_name, product, organism_strain]
    row0:
      locus_tag: PMM0001

- id: resolve_gene_by_name
  tool: resolve_gene
  desc: Lookup by gene_name works
  params:
    identifier: dnaN
  expect:
    min_rows: 1
    contains:
      gene_name: dnaN

- id: resolve_gene_not_found
  tool: resolve_gene
  desc: Non-existent gene returns empty
  params:
    identifier: FAKE_GENE_999
  expect:
    min_rows: 0
    max_rows: 0

- id: resolve_gene_with_organism
  tool: resolve_gene
  desc: Organism filter narrows results
  params:
    identifier: dnaN
    organism: MED4
  expect:
    min_rows: 1
