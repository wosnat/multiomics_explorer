# ── Filter values ────────────────────────────────────────

- id: list_filter_values
  tool: list_filter_values
  desc: Returns gene categories and condition types (snapshot-stable, few changes expected)
  params: {}
  expect:
    # Combined JSON response: gene_categories + condition_types
    # These lists change only on KG rebuild, so treat as near-snapshot.

- id: list_filter_values_categories
  tool: raw_cypher
  desc: Snapshot of all gene categories with counts
  params:
    query: >
      MATCH (g:Gene) WHERE g.gene_category IS NOT NULL
      RETURN g.gene_category AS category, count(*) AS gene_count
      ORDER BY gene_count DESC
  expect:
    min_rows: 20
    columns: [category, gene_count]
    contains:
      category: Photosynthesis

- id: list_filter_values_conditions
  tool: raw_cypher
  desc: Snapshot of all condition types with counts
  params:
    query: >
      MATCH (e:EnvironmentalCondition)
      RETURN e.condition_type AS condition_type, count(*) AS cnt
      ORDER BY cnt DESC
  expect:
    min_rows: 5
    columns: [condition_type, cnt]
    contains:
      condition_type: nitrogen_stress

# ── List organisms ──────────────────────────────────────

- id: list_organisms
  tool: list_organisms
  desc: Returns all organisms with metadata (snapshot-stable, few changes expected)
  params: {}
  expect:
    min_rows: 10
    max_rows: 25
    columns: [name, genus, strain, clade, gene_count]
    contains:
      name: Prochlorococcus MED4
    row0:
      genus: Alphainfluenzavirus

- id: list_organisms_raw
  tool: raw_cypher
  desc: Snapshot of all organisms with metadata
  params:
    query: >
      MATCH (o:OrganismTaxon)
      OPTIONAL MATCH (g:Gene)-[:Gene_belongs_to_organism]->(o)
      RETURN o.preferred_name AS name, o.genus AS genus,
             o.strain_name AS strain, o.clade AS clade,
             count(g) AS gene_count
      ORDER BY o.genus, o.preferred_name
  expect:
    min_rows: 10
    columns: [name, genus, strain, clade, gene_count]
    contains:
      name: Prochlorococcus MED4

# ── Validation queries ───────────────────────────────────

- id: gene_count_nonzero
  tool: raw_cypher
  desc: KG has genes loaded
  params:
    query: "MATCH (g:Gene) RETURN count(g) AS cnt"
  expect:
    min_rows: 1
    row0_check: "cnt > 0"

- id: no_orphan_genes
  tool: raw_cypher
  desc: All genes belong to an organism
  params:
    query: "MATCH (g:Gene) WHERE NOT (g)-[:Gene_belongs_to_organism]->() RETURN count(g) AS cnt"
  expect:
    row0:
      cnt: 0

- id: organisms_exist
