# ── Filter values ────────────────────────────────────────

- id: list_filter_values
  tool: list_filter_values
  desc: Returns gene categories (snapshot-stable, few changes expected)
  params: {}
  expect:

- id: list_filter_values_categories
  tool: raw_cypher
  desc: Snapshot of all gene categories with counts
  params:
    query: >
      MATCH (g:Gene) WHERE g.gene_category IS NOT NULL
      RETURN g.gene_category AS category, count(*) AS gene_count
      ORDER BY gene_count DESC
  expect:
    min_rows: 20
    columns: [category, gene_count]
    contains:
      category: Photosynthesis

# ── List organisms ──────────────────────────────────────

- id: list_organisms
  tool: list_organisms
  desc: Returns all organisms with precomputed stats
  params: {}
  expect:
    min_rows: 13
    max_rows: 25
    columns: [organism_name, genus, species, strain, clade, ncbi_taxon_id,
              gene_count, publication_count, experiment_count,
              treatment_types, omics_types]
    contains:
      organism_name: Prochlorococcus MED4

- id: list_organisms_raw
  tool: raw_cypher
  desc: Snapshot of all organisms with precomputed stats
  params:
    query: >
      MATCH (o:OrganismTaxon)
      RETURN o.preferred_name AS organism_name, o.genus AS genus,
             o.species AS species, o.strain_name AS strain,
             o.clade AS clade, o.ncbi_taxon_id AS ncbi_taxon_id,
             o.gene_count AS gene_count,
             o.publication_count AS publication_count,
             o.experiment_count AS experiment_count,
             o.treatment_types AS treatment_types,
             o.omics_types AS omics_types
      ORDER BY o.genus, o.preferred_name
  expect:
    min_rows: 13
    columns: [organism_name, genus, species, strain, clade, ncbi_taxon_id,
              gene_count, publication_count, experiment_count,
              treatment_types, omics_types]
    contains:
      organism_name: Prochlorococcus MED4

# ── Validation queries ───────────────────────────────────

- id: gene_count_nonzero
  tool: raw_cypher
  desc: KG has genes loaded
  params:
    query: "MATCH (g:Gene) RETURN count(g) AS cnt"
  expect:
    min_rows: 1
    row0_check: "cnt > 0"

- id: no_orphan_genes
  tool: raw_cypher
  desc: All genes belong to an organism
  params:
    query: "MATCH (g:Gene) WHERE NOT (g)-[:Gene_belongs_to_organism]->() RETURN count(g) AS cnt"
  expect:
    row0:
      cnt: 0

- id: organisms_exist
  tool: raw_cypher
  desc: OrganismTaxon nodes are present
  params:
    query: "MATCH (o:OrganismTaxon) RETURN count(o) AS cnt"
  expect:
    min_rows: 1
    row0_check: "cnt > 0"

