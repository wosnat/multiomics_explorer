# ── Compare conditions ──────────────────────────────────

- id: compare_conditions_med4
  tool: compare_conditions
  desc: Cross-condition comparison for MED4
  params:
    organisms: ["MED4"]
    limit: 10
  expect:
    min_rows: 1
