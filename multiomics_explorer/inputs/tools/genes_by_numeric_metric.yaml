  - title: DE → top hits → numeric DM intersection
    steps: |
      Step 1: differential_expression_by_gene(organism="MED4", significant_only=True, limit=20)
              → extract `locus_tag` from each result row (top-20 |log2FC|).

      Step 2: genes_by_numeric_metric(
                metric_types=["damping_ratio"],
                locus_tags=[<those 20 locus_tags>])
              → re-rank within those genes only; check which DE hits also
                lead the damping_ratio distribution (per-row `rank_by_metric`,
                `metric_percentile`, `metric_bucket`).

      Step 3 (drill-down): gene_overview(locus_tags=[<intersected genes>])
              → routing context for the genes that are both DE-significant
                AND high-damping.

verbose_fields:
  - metric_type
  - field_description
  - unit
  - compartment
  - experiment_id
  - publication_doi
  - treatment_type
  - background_factors
  - treatment
  - light_condition
  - experimental_context
  - gene_function_description
  - gene_summary
  - p_value

chaining:
  - "list_derived_metrics(value_kind='numeric', rankable=True) → genes_by_numeric_metric(derived_metric_ids=[...], bucket=[...])"
  - "differential_expression_by_gene → top hits → genes_by_numeric_metric(metric_types=[...], locus_tags=hits)"
  - "genes_by_numeric_metric → gene_overview(locus_tags=results)"

mistakes:
  - >-
    Non-rankable DM + rankable-gated filter. Calling with
    `metric_types=['peak_time_transcript_h']` + `bucket=['top_decile']`
    raises — `peak_time_transcript_h` is non-rankable. Inspect
    `list_derived_metrics(value_kind='numeric', rankable=True)` to see
    which DMs support `bucket` / `min_percentile` / `max_percentile` /
    `max_rank`. Mixed rankable/non-rankable DM sets don't raise — instead
    the envelope's `excluded_derived_metrics` + `warnings` pinpoint the
    excluded ones.
  - >-
    P-value filter on current KG. `significant_only=True` or
    `max_adjusted_p_value=0.05` raises today because no DM has
    `has_p_value='true'`. The surface exists for future DMs; check
    `list_derived_metrics(has_p_value=True)` first.
  - >-
    Sparse columns in results. `rank_by_metric` / `metric_percentile` /
    `metric_bucket` are null in rows from non-rankable DMs (e.g.
    `peak_time_*_h`); don't treat null as missing data — it's gate-driven.
    Per-row `rankable` (echoed from the parent DM) tells you which to
    expect.
  - >-
    Cross-organism by default. No single-organism enforcement.
    `metric_types=['cell_abundance_biovolume_normalized']` returns rows
    from MIT9312 AND MIT9313 (the same metric_type spans both). Use
    `organism='MIT9312'` to scope; check per-row `organism_name` and
    envelope `by_organism` for cross-strain rows.
  - >-
    `by_metric` is per-DM, not per-tag. Each `by_metric` entry is one
    DerivedMetric (uniquely identified by `derived_metric_id`). The same
    `metric_type` tag can appear across organisms (4 such tags in current
    KG). Use the per-DM rollup to disambiguate.
  - >-
    Wrong-`value_kind` IDs land in `not_found_ids`, not a typed error.
    Passing a `derived_metric_ids` of a boolean or categorical DM today
    produces `not_found_ids=[that_id]` rather than a `value_kind` mismatch
    error — the diagnostics query hardcodes `value_kind='numeric'`, so
    non-numeric DMs simply don't appear in the result. Inspect via
    `list_derived_metrics(derived_metric_ids=[...])` to see the DM's
    actual `value_kind` and pivot to `genes_by_boolean_metric` or
    `genes_by_categorical_metric`. Slice-1 simplification — a richer
    'wrong value_kind' diagnostic ships in a follow-up.
  - >-
    Filtered slice vs full DM. `by_metric[i].value_*` describes rows that
    survived your filters. `by_metric[i].dm_value_*` describes the full
    DM (precomputed). They're different — your top-decile slice is
    intentionally narrower than the full DM range.
