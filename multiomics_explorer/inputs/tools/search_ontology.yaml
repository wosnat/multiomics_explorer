# Human-authored content for search_ontology about page.
# Auto-generated sections (params, response format, expected-keys)
# come from Pydantic models via scripts/build_about_content.py.

examples:
  - title: Search GO biological processes
    call: search_ontology(search_text="replication", ontology="go_bp")
    response: |
      {
        "total_entries": 2448,
        "total_matching": 31,
        "score_max": 2.48,
        "score_median": 1.78,
        "returned": 5,
        "truncated": true,
        "offset": 0,
        "results": [
          {"id": "go:0006260", "name": "DNA replication", "score": 2.48},
          {"id": "go:0006261", "name": "DNA-templated DNA replication", "score": 2.41},
          ...
        ]
      }

  - title: Summary only (how many terms match?)
    call: search_ontology(search_text="transport", ontology="go_bp", summary=True)

  - title: BRITE search scoped to a specific tree
    call: search_ontology(search_text="transport", ontology="brite", tree="transporters")
    response: |
      {
        "total_entries": 84,
        "total_matching": 12,
        "score_max": 3.1,
        "score_median": 2.0,
        "returned": 5,
        "truncated": true,
        "offset": 0,
        "results": [
          {"id": "brite:B99001", "name": "ABC transporters", "score": 3.1, "level": 1, "tree": "transporters", "tree_code": "ko02000"},
          ...
        ]
      }

  - title: Filter search results by hierarchy level
    call: search_ontology(search_text="oxido*", ontology="kegg", level=2)

