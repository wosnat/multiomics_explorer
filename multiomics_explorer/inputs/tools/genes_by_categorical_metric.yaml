  - title: DE → top hits → categorical classification intersection
    steps: |
      Step 1: differential_expression_by_gene(organism="MED4", significant_only=True, limit=20)
              → extract `locus_tag` from each result row (top-20 |log2FC|).

      Step 2: genes_by_categorical_metric(
                metric_types=["predicted_subcellular_localization"],
                locus_tags=[<those 20 locus_tags>])
              → which DE hits have a vesicle-PSORTb classification?
                Per-row `value` carries the category label; envelope
                `by_category` shows the slice's class distribution.

      Step 3 (drill-down): gene_overview(locus_tags=[<intersected genes>])
              → routing context for the genes that are both DE-significant
                AND classified to a target compartment.

verbose_fields:
  - metric_type
  - field_description
  - unit
  - compartment
  - experiment_id
  - publication_doi
  - treatment_type
  - background_factors
  - treatment
  - light_condition
  - experimental_context
  - gene_function_description
  - gene_summary
  - allowed_categories

chaining:
  - "list_derived_metrics(value_kind='categorical') → genes_by_categorical_metric(metric_types=[...], categories=[...]) → gene_overview / genes_by_function"
  - "differential_expression_by_gene → top hits → genes_by_categorical_metric(metric_types=[...], locus_tags=hits)"
  - "genes_by_categorical_metric (no organism filter) → split via envelope by_organism for cross-strain comparison"

mistakes:
  - >-
    Unknown category raises with the allowed-set in the error.
    `categories=['foo']` raises `ValueError` listing every value in the
    union of selected DMs' `allowed_categories`. Pull the set from
    `list_derived_metrics(value_kind='categorical')` verbose output, or
    read it from the error message itself — the tool surfaces the full
    union without a follow-up call.
  - >-
    `allowed_categories` ⊋ `dm_by_category`. A category may be declared
    in `allowed_categories` (schema-level) but unobserved in any gene
    (absent from `dm_by_category`). Example: MED4 PSORTb declares
    `Extracellular` but no gene is classified that way — `dm_by_category`
    omits it. Both per-DM context fields appear in each `by_metric` row;
    inspect them together before assuming a category exists in the data.
  - >-
    Sparse `rankable` / `has_p_value` echoes. Both are always `False` on
    every row from current categorical DMs — kept for cross-tool row-shape
    consistency with `genes_by_numeric_metric`, not because this tool
    reads them as a meaningful signal. Don't gate downstream logic on
    them.
  - wrong: genes_by_categorical_metric(derived_metric_ids=['derived_metric:...:damping_ratio'])  # numeric DM
    right: genes_by_categorical_metric(metric_types=['predicted_subcellular_localization'])  # discover IDs via list_derived_metrics(value_kind='categorical') first
