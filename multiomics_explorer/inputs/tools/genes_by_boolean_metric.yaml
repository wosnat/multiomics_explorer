  - title: DE → top hits → boolean flag intersection
    steps: |
      Step 1: differential_expression_by_gene(organism="MED4", significant_only=True, limit=20)
              → extract `locus_tag` from each result row (top-20 |log2FC|).

      Step 2: genes_by_boolean_metric(
                metric_types=["vesicle_proteome_member"],
                locus_tags=[<those 20 locus_tags>])
              → which DE hits are also vesicle-proteome members?
                Per-row `value="true"` confirms the flag; envelope
                `total_matching` shows the intersection size.

      Step 3 (drill-down): gene_overview(locus_tags=[<intersected genes>])
              → routing context for the genes that are both DE-significant
                AND vesicle-detected.

verbose_fields:
  - metric_type
  - field_description
  - unit
  - compartment
  - experiment_id
  - publication_doi
  - treatment_type
  - background_factors
  - treatment
  - light_condition
  - experimental_context
  - gene_function_description
  - gene_summary

chaining:
  - "list_derived_metrics(value_kind='boolean') → genes_by_boolean_metric(metric_types=[...]) → gene_overview / genes_by_function"
  - "differential_expression_by_gene → top hits → genes_by_boolean_metric(metric_types=[...], locus_tags=hits)"
  - "genes_by_boolean_metric (no organism filter) → split via envelope by_organism for cross-strain comparison"

mistakes:
  - >-
    Positive-only storage in current KG. `flag=False` returns zero rows
    today because every materialized boolean edge is `r.value="true"`
    (slice-1 spec §"KG invariants" §4 — `dm.flag_false_count=0` on every
    current DM). Inspect `by_metric[*].dm_false_count` (always 0 today)
    before assuming a gene is "not flagged false". Mirrors the numeric
    tool's "p-value filter on current KG" gotcha — surface exists for
    future DMs.
  - >-
    Sparse `rankable` / `has_p_value` echoes. Both are always `False` on
    every row from current boolean DMs — kept for cross-tool row-shape
    consistency with `genes_by_numeric_metric`, not because this tool
    reads them as a meaningful signal. Don't gate downstream logic on
    them.
  - wrong: genes_by_boolean_metric(derived_metric_ids=['derived_metric:...:damping_ratio'])  # numeric DM
    right: genes_by_boolean_metric(metric_types=['vesicle_proteome_member'])  # discover IDs via list_derived_metrics(value_kind='boolean') first
