# Human-authored content for list_metabolites about page.
# Auto-generated sections (params, response format, expected-keys)
# come from Pydantic models via scripts/build_about_content.py.

examples:
  - title: All N-bearing metabolites in MED4 (the N-source workflow primitive)
    call: list_metabolites(organism_names=["Prochlorococcus MED4"], elements=["N"], limit=5)

  - title: Pathway-anchored — metabolites in nitrogen metabolism
    call: list_metabolites(pathway_ids=["kegg.pathway:ko00910"], limit=10)

  - title: Cross-organism survey — metabolites both partners reach
    call: list_metabolites(organism_names=["Prochlorococcus MED4", "Alteromonas macleodii MIT1002"], summary=True)

  - title: Lucene search by name
    call: list_metabolites(search_text="glucose", limit=3)

  - title: Transport-only metabolites (TCDB-curated substrates without local catalysis)
    call: list_metabolites(evidence_sources=["transport"], summary=True)

  - title: Measured metabolites — measurement coverage envelope
    call: list_metabolites(evidence_sources=["metabolomics"], summary=True)
    response: |
      {"total_entries": 3218, "total_matching": 107,
       "by_measurement_coverage": {
         "by_paper_count": [{"paper_count": 1, "n": 99}, {"paper_count": 2, "n": 8}],
         "by_compartment": [{"compartment": "whole_cell", "n": 99}, {"compartment": "extracellular", "n": 92}]
       },
       "returned": 0, "truncated": true, "offset": 0, "results": []}

  - title: Multi-step — find N-metabolites then drill into catalysts
    steps: |
      Step 1: list_metabolites(organism_names=["Prochlorococcus MED4"], elements=["N"], limit=10)
              → extract metabolite_ids of interest

      Step 2: genes_by_metabolite(metabolite_ids=[chosen_ids], organism="Prochlorococcus MED4")
              → catalysing genes per metabolite

  - title: Currency-cofactor strip — exclude ATP/ADP/NADH/NADPH/H2O when top_metabolites is dominated by them
    call: |
      list_metabolites(
        organism_names=["Prochlorococcus MED4"],
        exclude_metabolite_ids=[
          "kegg.compound:C00002",  # ATP
          "kegg.compound:C00008",  # ADP
          "kegg.compound:C00004",  # NADH
          "kegg.compound:C00005",  # NADPH
          "kegg.compound:C00001",  # H2O
        ],
        summary=True,
      )
    # Set-difference semantics: when both `metabolite_ids` and
    # `exclude_metabolite_ids` are passed, exclude wins on overlap (silent —
    # no warning). Empty list is a no-op (treated as None).

verbose_fields:
  - inchikey
  - smiles
  - mnxm_id
  - hmdb_id
  - pathway_names

chaining:
  - "list_organisms (per-row metabolite_count > 0) → list_metabolites(organism_names=[...])"
  - "list_metabolites → genes_by_metabolite(metabolite_ids=[...], organism=...)"
  - "list_metabolites (per-row pathway_ids) → genes_by_ontology(ontology='kegg', term_ids=[pathway_id], organism=...)"
  - "differential_expression_by_gene → metabolites_by_gene(metabolite_elements=['N']) → list_metabolites for chemistry context"
  - "list_metabolites (per-row `measured_assay_count > 0`) → assays_by_metabolite(metabolite_ids=[...]) — reverse lookup of all measurement evidence (numeric + boolean) for the measured compounds (cross-organism by default)."

mistakes:
  - "Direction-agnostic — KEGG equation order is unreliable upstream, so joins through Reaction_has_metabolite (catalysis) and Tcdb_family_transports_metabolite (transport) do NOT distinguish substrates from products. Layer DE direction (`differential_expression_by_gene`) and functional annotation to disambiguate. See docs://guide/conventions."
  - "gene_count = 0 does not mean the metabolite is absent from the KG — it indicates a metabolomics-only metabolite (measured by mass spec but not reachable via any gene catalysis or transport path). Check `evidence_sources`: a gene_count=0 metabolite carries `['metabolomics']` only."
  - "organism_names with multiple values is UNION, not intersection. To find metabolites BOTH organisms reach, run two single-org calls and intersect by metabolite_id (or filter per-row by organism_count and inspect `m.organism_names` for the full UNION list)."
  - "metaboliteFullText covers Metabolite.name only — NOT formula. For element/composition queries, use `elements` (presence list)."
  - "evidence_sources='metabolomics' selects metabolites measured by a MetaboliteAssay. Drill in via list_metabolite_assays(metabolite_ids=[...]) or assays_by_metabolite to inspect the measurement evidence."
  - "Same metabolite measured in both whole_cell and extracellular returns one row with `measured_compartments=['extracellular','whole_cell']` (sorted), not two rows — Metabolite is compartment-agnostic."
  - "When the `top_metabolites` rollup is dominated by ATP / ADP / NADH / NADPH / H2O, pass `exclude_metabolite_ids=[<kegg.compound:Cxxxxx>]` to strip cofactor noise. KG namespace is `kegg.compound:` (not `chebi:`)."
  - wrong: "list_metabolites(elements=['N'], gene_count_min=1)  # gene_count_min isn't a param"
    right: "list_metabolites(elements=['N'])  # then filter rows in code by gene_count > 0"
  - wrong: "list_metabolites(organism_names=['MED4'])  # short name doesn't match"
    right: "list_metabolites(organism_names=['Prochlorococcus MED4'])  # full preferred_name"
  - "See `docs://analysis/metabolites` for the 3 source pipelines decision tree (metabolism / transport / metabolomics) and `docs://guide/concepts` for the chemistry layer overview."
