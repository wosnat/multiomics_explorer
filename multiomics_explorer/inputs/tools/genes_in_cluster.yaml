# Human-authored content for genes_in_cluster about page.
# Auto-generated sections (params, response format, expected-keys)
# come from Pydantic models via scripts/build_about_content.py.

examples:
  - title: Get members of a specific cluster
    call: genes_in_cluster(cluster_ids=["cluster:msb4100087:med4_kmeans_nstarvation:8"])

  - title: Get all genes in a clustering analysis
    call: genes_in_cluster(analysis_id="clustering_analysis:msb4100087:med4_kmeans_nstarvation")

  - title: Handle invalid cluster IDs gracefully
    call: genes_in_cluster(cluster_ids=["cluster:msb4100087:med4_kmeans_nstarvation:8", "cluster:fake_id"])

  - title: From analysis search to member gene expression
    steps: |
      Step 1: list_clustering_analyses(search_text="nitrogen")
              → extract analysis_id values from results

      Step 2: genes_in_cluster(analysis_id="clustering_analysis:msb4100087:med4_kmeans_nstarvation")
              → get all member genes across clusters in the analysis

      Step 3: differential_expression_by_gene(locus_tags=["PMM0370", "PMM0920", "PMM0958", "PMM0970", "PMM1462"])
              → check expression patterns for the cluster members

verbose_fields:
  - gene_function_description
  - gene_summary
  - p_value
  - cluster_functional_description
  - cluster_expression_dynamics
  - cluster_temporal_pattern

chaining:
  - "list_clustering_analyses → genes_in_cluster(analysis_id=...) → gene_overview"
  - "list_clustering_analyses → genes_in_cluster → differential_expression_by_gene"
  - "gene_clusters_by_gene → genes_in_cluster → differential_expression_by_gene"

mistakes:
  - "Cluster IDs come from list_clustering_analyses or gene_clusters_by_gene results — they are not gene locus tags"
  - "Use analysis_id to get ALL genes across ALL clusters in an analysis; use cluster_ids for specific clusters"
  - "not_found_clusters means the ID doesn't exist in the KG; not_matched_clusters means the cluster exists but has no members matching your organism filter"
  - "Results are gene × cluster rows — when querying multiple clusters, a gene in both appears twice. Use by_cluster to see per-cluster counts."
  - wrong: "genes_in_cluster(cluster_ids=['PMM0370'])  # passing a gene locus tag"
    right: "gene_clusters_by_gene(locus_tags=['PMM0370'])  # use gene_clusters_by_gene for gene → cluster direction"
  - wrong: "genes_in_cluster(cluster_ids='cluster:msb4100087:med4_kmeans_nstarvation:8')"
    right: "genes_in_cluster(cluster_ids=['cluster:msb4100087:med4_kmeans_nstarvation:8']) — always a list"
