# Human-authored content for cluster_enrichment about page.

python_returns: EnrichmentResult
python_returns_example: docs://examples/pathway_enrichment.py

examples:
  - title: Single analysis, CyanoRak level 1
    call: cluster_enrichment(analysis_id="clustering_analysis:journal.pone.0005135:med4_diel_clusters", organism="MED4", ontology="cyanorak_role", level=1)

  - title: Summary-only (envelope, no rows)
    call: cluster_enrichment(analysis_id="clustering_analysis:journal.pone.0005135:med4_diel_clusters", organism="MED4", ontology="cyanorak_role", level=1, summary=True)

  - title: BRITE tree-scoped
    call: cluster_enrichment(analysis_id="clustering_analysis:journal.pone.0005135:med4_diel_clusters", organism="MED4", ontology="brite", tree="transporters", level=1)

  - title: Organism background instead of cluster union
    call: cluster_enrichment(analysis_id="clustering_analysis:journal.pone.0005135:med4_diel_clusters", organism="MED4", ontology="cyanorak_role", level=1, background="organism")

  - title: From landscape to cluster enrichment
    steps: |
      Step 1: list_clustering_analyses(organism="MED4")
              → pick an analysis_id

      Step 2: ontology_landscape(organism="MED4")
              → pick (ontology, level) by relevance_rank

      Step 3: cluster_enrichment(analysis_id=<picked>, organism="MED4", ontology=<picked>, level=<picked>)
              → Fisher ORA results per cluster

verbose_fields:
  - cluster_functional_description
  - cluster_expression_dynamics
  - cluster_temporal_pattern
  - cluster_member_count

response_notes:
  - title: "`informative_only` filter (default 2026-05)"
    body: |
      When True (default), exclude ontology terms flagged uninformative
      in the KG (e.g. KEGG map00001 'metabolic pathways', GO root
      go:0008150). Term-side filter — never restricts the gene set,
      background, or DE inputs. Pass False to include uninformative terms;
      per-row `is_informative` still surfaces in either mode.

      See `docs://analysis/enrichment` (section "Informative-only filtering")
      for rationale, Fisher denominator behavior, and opt-out guidance.

chaining:
  - "list_clustering_analyses → cluster_enrichment"
  - "ontology_landscape → cluster_enrichment"
  - "cluster_enrichment → gene_overview"
  - "cluster_enrichment → genes_in_cluster"
  - "cluster_enrichment(ontology='kegg', ...) → list_metabolites(pathway_ids=[<enriched_pathway_id>]) — inspect the chemistry of an enriched KEGG pathway (compound-anchored membership, distinct from the gene-KO membership the enrichment used). See docs://analysis/metabolites Track A1 §f for the pathway-anchor disambiguation."
  - "See `docs://analysis/enrichment` for the full methodology, including the `informative_only` (default `True` since 2026-05) filter semantics."

mistakes:
  - "Caller pinning row counts from pre-2026-05 runs sees fewer rows by default. Pass `informative_only=False` to restore old behavior, or accept the new default (recommended)."
  - "Default background is `cluster_union` (union of all clustered genes, including size-filtered). Use `'organism'` only when clustering covers the full genome."
  - "BH correction is per-cluster, NOT across clusters."
  - "Single-organism enforced."
  - "No signed_score — clusters aren't directional. For direction-aware enrichment, use pathway_enrichment with DE experiments."
  - "At least one of `level` or `term_ids` must be provided."
  - "`min/max_gene_set_size` is the pathway M filter (per-cluster, clusterProfiler semantics). `min/max_cluster_size` is the cluster membership filter."
  - "For BRITE, scope to a specific tree with `tree=`. Use `list_filter_values('brite_tree')` to discover trees."
  - "When a KEGG pathway is significantly enriched in a cluster, drill into its chemistry via `list_metabolites(pathway_ids=[<term_id>])`. The cluster's gene-KO membership and the pathway's compound-membership reach the same KEGG map via different relations — name the anchor when answering. See docs://analysis/metabolites Track A1 §f."
  - wrong: "cluster_enrichment(..., background='table_scope')  # not valid"
    right: "cluster_enrichment(..., background='cluster_union')  # or 'organism', or a locus_tag list"
