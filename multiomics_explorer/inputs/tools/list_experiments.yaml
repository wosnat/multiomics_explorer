# Human-authored content for list_experiments about page.
# Auto-generated sections (params, response format, expected-keys)
# come from Pydantic models via scripts/build_about_content.py.

examples:
  - title: Orient — what experiments exist?
    call: list_experiments(summary=True)
    response: |
      {"total_entries": 76, "total_matching": 76,
       "by_organism": [{"organism_strain": "Prochlorococcus MED4", "experiment_count": 30}, ...],
       "by_treatment_type": [{"treatment_type": "coculture", "experiment_count": 16}, ...],
       "by_omics_type": [{"omics_type": "RNASEQ", "experiment_count": 48}, ...],
       "by_table_scope": [{"table_scope": "all_detected_genes", "experiment_count": 40}, ...],
       "time_course_count": 29, "returned": 0, "truncated": true, "results": []}

  - title: Summary for MED4 only
    call: list_experiments(summary=True, organism="MED4")

  - title: Browse coculture experiments with Alteromonas
    call: list_experiments(treatment_type=["coculture"], coculture_partner="Alteromonas")

  - title: Time-course nitrogen stress in MED4
    call: list_experiments(organism="MED4", treatment_type=["nitrogen_stress"], time_course_only=True)

  - title: From publication to expression data
    steps: |
      Step 1: list_publications(search_text="Biller")
              → get DOI from results

      Step 2: list_experiments(publication_doi=["10.1038/ismej.2016.70"])
              → browse experiments, pick experiment_id

      Step 3: query_expression(experiment_id="...")
              → get gene-level results

  - title: Orient then drill down
    steps: |
      Step 1: list_experiments(summary=True)
              → see 76 total, by_organism: MED4 (30), by_treatment_type: coculture (16), by_omics_type: RNASEQ (48)

      Step 2: list_experiments(organism="MED4", treatment_type=["coculture"])
              → browse the MED4 coculture experiments

      Step 3: query_expression(experiment_id="...")
              → get gene-level results

verbose_fields:
  - publication_title
  - treatment
  - control
  - light_condition
  - light_intensity
  - medium
  - temperature
  - statistical_test
  - experimental_context

chaining:
  - "list_organisms → list_experiments"
  - "list_publications → list_experiments"
  - "list_filter_values → list_experiments"
  - "list_experiments → query_expression"

mistakes:
  - "Default is detail (summary=false) — use summary=true to see only breakdowns"
  - "gene_count is total genes with expression data, not total significant genes — use genes_by_status for the breakdown"
  - "timepoints is omitted for non-time-course experiments, not an empty list"
  - "When summary=true, verbose and limit have no effect"
  - "Check table_scope before interpreting missing genes — some experiments only include significant genes"
  - wrong: "list_experiments(publication='Biller 2018')"
    right: "list_publications(search_text='Biller') then list_experiments(publication_doi=['10.1038/...'])"
